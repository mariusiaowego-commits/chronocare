{% extends "base.html" %}
{% block title %}记录血糖 - ChronoCare{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">🩸 记录血糖</h1>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">老人 *</label>
            <select name="person_id" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                {% for p in persons %}
                <option value="{{ p.id }}" {{ 'selected' if selected_person_id == p.id }}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">日期 *</label>
                <input type="date" name="record_date" required value="{{ import('datetime').date.today() }}"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">时间</label>
                <input type="time" name="record_time"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">血糖值 (mmol/L) *</label>
                <input type="number" name="value" step="0.1" inputmode="decimal" required
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">测量类型</label>
                <select name="meal_context" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                    <option value="fasting">空腹</option>
                    <option value="before_meal">餐前</option>
                    <option value="after_meal">餐后</option>
                    <option value="random">随机</option>
                    <option value="bedtime">睡前</option>
                </select>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_alert" id="is_alert"
                   class="w-4 h-4 text-red-600 rounded">
            <label for="is_alert" class="text-sm">标记为异常</label>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="notes" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">保存</button>
            <a href="/blood-sugar" class="px-6 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</a>
        </div>
    </form>
</div>
{% endblock %}
