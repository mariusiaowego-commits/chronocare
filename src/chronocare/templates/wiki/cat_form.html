{% extends "base.html" %}
{% block title %}{% if category %}编辑分类{% else %}新建分类{% endif %}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{% if category %}编辑分类{% else %}📁 新建知识分类{% endif %}</h1>

<form method="post" action="{% if category %}/wiki/categories/{{ category.id }}/edit{% else %}/wiki/categories/new{% endif %}" class="max-w-lg">
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">名称 *</label>
      <input type="text" name="name" value="{{ category.name if category else '' }}" required
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Slug *</label>
      <input type="text" name="slug" value="{{ category.slug if category else '' }}" required
             pattern="[a-z0-9-]+" placeholder="如: tangniaobing"
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">图标</label>
      <input type="text" name="icon" value="{{ category.icon if category else '' }}"
             placeholder="如: 🩸 💊 🫀" class="w-full border rounded px-3 py-2">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">描述</label>
      <textarea name="description" rows="3" class="w-full border rounded px-3 py-2">{{ category.description if category else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">排序</label>
      <input type="number" name="sort_order" value="{{ category.sort_order if category else 0 }}"
             class="w-full border rounded px-3 py-2">
    </div>

    <input type="hidden" name="parent_id" value="{{ category.parent_id if category else '' }}">

    <div class="flex gap-3 pt-4">
      <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">
        {% if category %}保存修改{% else %}创建分类{% endif %}
      </button>
      <a href="/wiki" class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400">取消</a>
    </div>
  </div>
</form>
{% endblock %}
