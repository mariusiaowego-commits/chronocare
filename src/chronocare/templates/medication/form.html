{% extends "base.html" %}
{% block title %}添加用药计划 - ChronoCare{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">💊 添加用药计划</h1>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">老人 *</label>
            <select name="person_id" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                {% for p in persons %}
                <option value="{{ p.id }}" {{ 'selected' if selected_person_id == p.id }}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">药品 *</label>
            <select name="medication_id" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                {% for m in medications %}
                <option value="{{ m.id }}">{{ m.name }}{% if m.specification %} ({{ m.specification }}){% endif %}</option>
                {% endfor %}
            </select>
            {% if not medications %}
            <p class="text-sm text-red-500 mt-1">请先<a href="/medication/meds/new" class="underline">添加药品</a></p>
            {% endif %}
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">剂量 *</label>
                <input type="text" name="dosage" required placeholder="如: 1片, 5ml"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">频率 *</label>
                <select name="frequency" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                    <option value="daily">每日一次</option>
                    <option value="twice_daily">每日两次</option>
                    <option value="three_times_daily">每日三次</option>
                    <option value="weekly">每周</option>
                    <option value="as_needed">按需</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">服药时间</label>
                <input type="text" name="timing" placeholder="如: 饭后30分钟"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">开始日期 *</label>
                <input type="date" name="start_date" required value="{{ import('datetime').date.today() }}"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">结束日期</label>
                <input type="date" name="end_date"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="notes" rows="2" placeholder="如: 避免与牛奶同服"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_active" id="is_active" checked
                   class="w-4 h-4 text-green-600 rounded">
            <label for="is_active" class="text-sm">启用</label>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">保存</button>
            <a href="/medication" class="px-6 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</a>
        </div>
    </form>
</div>
{% endblock %}
