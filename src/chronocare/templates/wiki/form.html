{% extends "base.html" %}
{% block title %}{% if article %}编辑文章{% else %}新建文章{% endif %}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{% if article %}编辑文章{% else %}📝 新建知识文章{% endif %}</h1>

<form method="post" action="{% if article %}/wiki/{{ article.id }}/edit{% else %}/wiki/new{% endif %}" class="max-w-2xl">
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">标题 *</label>
      <input type="text" name="title" value="{{ article.title if article else '' }}" required
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Slug *</label>
      <input type="text" name="slug" value="{{ article.slug if article else '' }}" required
             pattern="[a-z0-9-]+" placeholder="如: tangniaobing-yinshi"
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
      <p class="text-xs text-gray-500 mt-1">小写字母、数字和连字符，如 tangniaobing-yinshi</p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">分类</label>
      <select name="category_id" class="w-full border rounded px-3 py-2">
        <option value="">-- 无分类 --</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if article and article.category_id == cat.id %}selected{% endif %}>
          {{ cat.icon or '📁' }} {{ cat.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">内容 * (Markdown)</label>
      <textarea name="content" rows="15" required
                class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 font-mono">{{ article.content if article else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">标签 (逗号分隔)</label>
      <input type="text" name="tags" value="{{ article.tags|join(', ') if article and article.tags else '' }}"
             placeholder="如: 糖尿病, 饮食, 低GI"
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">来源</label>
        <input type="text" name="source" value="{{ article.source if article else '' }}"
               class="w-full border rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">来源链接</label>
        <input type="url" name="source_url" value="{{ article.source_url if article else '' }}"
               class="w-full border rounded px-3 py-2">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">关联疾病 (逗号分隔)</label>
      <input type="text" name="related_conditions"
             value="{{ article.related_conditions|join(', ') if article and article.related_conditions else '' }}"
             placeholder="如: 2型糖尿病, 高血压"
             class="w-full border rounded px-3 py-2">
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_recommended" id="is_recommended" value="true"
             {% if article and article.is_recommended %}checked{% endif %}
             class="rounded">
      <label for="is_recommended" class="text-sm">⭐ 推荐阅读</label>
    </div>

    <input type="hidden" name="related_persons" value="[]">

    <div class="flex gap-3 pt-4">
      <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">
        {% if article %}保存修改{% else %}创建文章{% endif %}
      </button>
      <a href="/wiki" class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400">取消</a>
    </div>
  </div>
</form>
{% endblock %}
