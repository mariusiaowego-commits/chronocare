{% extends "base.html" %}
{% block title %}记录血压 - ChronoCare{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">❤️ 记录血压</h1>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">老人 *</label>
            <select name="person_id" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                {% for p in persons %}
                <option value="{{ p.id }}" {{ 'selected' if selected_person_id == p.id }}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">日期 *</label>
                <input type="date" name="record_date" required value="{{ today }}"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">时间</label>
                <input type="time" name="record_time"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">收缩压 (mmHg) *</label>
                <input type="number" name="systolic" required inputmode="numeric"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">舒张压 (mmHg) *</label>
                <input type="number" name="diastolic" required inputmode="numeric"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">心率 (bpm)</label>
                <input type="number" name="heart_rate" inputmode="numeric"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="notes" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">保存</button>
            <a href="/cardiac" class="px-6 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</a>
        </div>
    </form>
</div>
{% endblock %}
