{% extends "base.html" %}
{% block title %}{% if item %}编辑资讯{% else %}添加资讯{% endif %}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{% if item %}编辑资讯{% else %}📰 添加资讯{% endif %}</h1>

<form method="post" action="{% if item %}/news/{{ item.id }}/edit{% else %}/news/new{% endif %}" class="max-w-2xl">
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">标题 *</label>
      <input type="text" name="title" value="{{ item.title if item else '' }}" required
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-purple-500">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">原文链接</label>
      <input type="url" name="url" value="{{ item.url if item else '' }}"
             placeholder="https://..."
             class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-purple-500">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">来源</label>
        <input type="text" name="source" value="{{ item.source if item else '' }}"
               placeholder="如: 丁香医生"
               class="w-full border rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">分类</label>
        <input type="text" name="category" value="{{ item.category if item else '' }}"
               placeholder="如: 糖尿病、心脏病"
               class="w-full border rounded px-3 py-2">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">摘要</label>
      <textarea name="summary" rows="3" class="w-full border rounded px-3 py-2">{{ item.summary if item else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">内容 (本地存档)</label>
      <textarea name="content" rows="10" class="w-full border rounded px-3 py-2 font-mono">{{ item.content if item else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">标签 (逗号分隔)</label>
      <input type="text" name="tags" value="{{ item.tags|join(', ') if item and item.tags else '' }}"
             placeholder="如: 糖尿病, 新药, 研究"
             class="w-full border rounded px-3 py-2">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">发布时间</label>
      <input type="datetime-local" name="published_at"
             value="{{ item.published_at.strftime('%Y-%m-%dT%H:%M') if item and item.published_at else '' }}"
             class="w-full border rounded px-3 py-2">
    </div>

    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2">
        <input type="checkbox" name="is_bookmarked" value="true"
               {% if item and item.is_bookmarked %}checked{% endif %} class="rounded">
        <span class="text-sm">⭐ 收藏</span>
      </label>
      <label class="flex items-center gap-2">
        <input type="checkbox" name="is_shared" value="true"
               {% if item and item.is_shared %}checked{% endif %} class="rounded">
        <span class="text-sm">📤 已分享给老人</span>
      </label>
    </div>

    <div class="flex gap-3 pt-4">
      <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700">
        {% if item %}保存修改{% else %}添加资讯{% endif %}
      </button>
      <a href="/news" class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400">取消</a>
    </div>
  </div>
</form>
{% endblock %}
