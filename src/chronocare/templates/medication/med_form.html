{% extends "base.html" %}
{% block title %}添加药品 - ChronoCare{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">💊 添加药品</h1>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">药品名称 *</label>
            <input type="text" name="name" required placeholder="如: 阿司匹林"
                   class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">通用名</label>
                <input type="text" name="generic_name" placeholder="如: 乙酰水杨酸"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">规格</label>
                <input type="text" name="specification" placeholder="如: 100mg/片"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">分类</label>
                <input type="text" name="category" placeholder="如: 降压药, 降糖药"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">用法</label>
                <input type="text" name="usage_description" placeholder="如: 口服, 外用"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">副作用</label>
            <textarea name="side_effects" rows="2" placeholder="常见副作用"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">储存说明</label>
            <input type="text" name="storage_notes" placeholder="如: 阴凉干燥处保存"
                   class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea name="notes" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">保存</button>
            <a href="/medication" class="px-6 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</a>
        </div>
    </form>
</div>
{% endblock %}
