{# Lucide Icon Macro — usage: {{ icon('name', size, 'css-classes') }} #}
{% macro icon(name, size=20, class='') -%}
<svg class="inline-block align-middle {{ class }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">{% include 'icons/' + name + '.svg' ignore missing %}</svg>
{%- endmacro %}
