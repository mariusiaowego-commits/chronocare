{% extends "base.html" %}
{% block title %}添加就诊 - ChronoCare{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">🏥 添加就诊记录</h1>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">老人 *</label>
            <select name="person_id" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                {% for p in persons %}
                <option value="{{ p.id }}" {{ 'selected' if selected_person_id == p.id }}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">就诊日期 *</label>
                <input type="date" name="visit_date" required value="{{ import('datetime').date.today() }}"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">就诊类型</label>
                <select name="visit_type" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
                    <option value="">未分类</option>
                    <option value="initial">初诊</option>
                    <option value="followup">复诊</option>
                    <option value="emergency">急诊</option>
                    <option value="checkup">体检</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">医院</label>
                <input type="text" name="hospital"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">科室</label>
                <input type="text" name="department"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">医生</label>
                <input type="text" name="doctor"
                       class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">主诉</label>
            <textarea name="chief_complaint" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">诊断</label>
            <textarea name="diagnosis" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">处方</label>
            <textarea name="prescription" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">医嘱</label>
            <textarea name="doctor_advice" rows="2"
                      class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">复诊日期</label>
            <input type="date" name="next_followup_date"
                   class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-6 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition">保存</button>
            <a href="/visits" class="px-6 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</a>
        </div>
    </form>
</div>
{% endblock %}
